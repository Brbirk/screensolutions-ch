name: Deploy to Hostpoint FTP - Screensolutions

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: FTP Deploy to screensolutions.ch
      uses: SamKirkland/FTP-Deploy-Action@4.3.3
      with:
        server: www.screensolutions.ch
        username: ftp@screensolutions.ch
        password: ${{ secrets.FTP_PASSWORD }}
        server-dir: /www/screensolutions.ch/
